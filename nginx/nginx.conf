upstream service_a { server service-a:8083; }
upstream service_b { server service-b:8084; }
upstream auth_service { server auth-service:8081; }

server {
    listen 80;

    # Subrequest d'authentification
    location = /_auth {
        internal;

        proxy_pass http://auth_service/validate;

        # subrequest sans body
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # token du client
        proxy_set_header Authorization $http_authorization;

        # le service cible sera défini dans /a/ et /b/
        proxy_set_header X-Target-Service $target_service;
    }

    # Réponse 403 uniforme
    location = /_forbidden {
        internal;
        return 403;
    }

    # ---------- Service A ----------
    location /a/ {
        if ($http_authorization = "") { return 403; }

        set $target_service "A";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;

        proxy_pass http://service_a/;
    }

    # ---------- Service B ----------
    location /b/ {
        if ($http_authorization = "") { return 403; }

        set $target_service "B";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;

        proxy_pass http://service_b/;
    }

    # ---------- Routes publiques vers Auth Service ----------
    location /register {
        proxy_pass http://auth_service/register;
    }

    location /login {
        proxy_pass http://auth_service/login;
    }

    location /verify {
        proxy_pass http://auth_service/verify;
    }
}
